name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Configure production service
        run: |
          echo "VITE_EXTEND_EMAIL_URL=https://seal-chessags.prod.gamingservices.accelbyte.io/ext-seal-chessags-ethan-chess-service" >> .env.production

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Enforce launch performance budget
        run: npm run perf:budget

      - name: Store bundle metrics
        uses: actions/upload-artifact@v4
        with:
          name: performance-budget-${{ github.sha }}
          path: performance-budget.json
          retention-days: 90

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
