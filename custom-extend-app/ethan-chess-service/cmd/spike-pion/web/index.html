<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cold-start test — play the bot when no human is found</title>
<style>
  body { font-family: system-ui, sans-serif; background:#12100f; color:#eee; display:flex; flex-direction:column; align-items:center; gap:14px; padding:20px; }
  h1 { font-size:1.05rem; font-weight:600; }
  .phase { display:flex; flex-direction:column; align-items:center; gap:14px; }
  /* matchmaking */
  #matchmaking { margin-top:40px; }
  .spinner { width:48px; height:48px; border-radius:50%; border:4px solid rgba(240,195,122,.2); border-top-color:#f0c37a; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #mm-title { font-size:1.3rem; color:#f0c37a; }
  #mm-status { color:#b7aa9e; }
  .pill { background:#1d1820; border:1px solid #333; border-radius:999px; padding:6px 14px; font:13px monospace; }
  /* board */
  #board { display:grid; grid-template-columns:repeat(8, 56px); grid-template-rows:repeat(8, 56px); border:3px solid #5a4632; }
  .sq { display:flex; align-items:center; justify-content:center; font-size:38px; cursor:pointer; user-select:none; }
  .light { background:#e9d3a8; } .dark { background:#a9794b; }
  .sq.sel { outline:3px solid #f0c37a; outline-offset:-3px; }
  .piece-w { color:#fff; text-shadow:0 0 2px #000; } .piece-b { color:#111; }
  #status { min-height:1.4em; font-size:.95rem; }
  #log { width:460px; height:110px; overflow:auto; background:#1d1820; border:1px solid #333; border-radius:8px; padding:8px; font:12px/1.5 monospace; color:#bbb; }
  button { background:#c26a3d; color:#fff; border:0; border-radius:8px; padding:8px 14px; cursor:pointer; }
  button.ghost { background:transparent; border:1px solid #555; color:#bbb; }
  .conn { font-size:.8rem; color:#999; }
  .opp { display:flex; align-items:center; gap:10px; background:#1d1820; border:1px solid #3a2f24; border-radius:12px; padding:10px 16px; }
  .opp .av { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#c26a3d,#f0c37a); display:flex; align-items:center; justify-content:center; font-size:20px; }
</style>
</head>
<body>
  <h1>Cold-start test <span id="conn" class="conn"></span></h1>

  <!-- Phase 1: matchmaking (simulated) -->
  <div id="matchmaking" class="phase">
    <div class="spinner"></div>
    <div id="mm-title">Finding an opponent…</div>
    <div id="mm-status">Searching for a player — <span id="mm-count"></span>s</div>
    <button id="skip" class="ghost">Skip the wait</button>
  </div>

  <!-- Phase 2: matched-with-bot banner -->
  <div id="matched" class="phase" style="display:none">
    <div class="opp"><span class="av">🤖</span><div><b id="bot-name">Gambit Gus</b><div class="conn">No player found nearby — matched you with a bot</div></div></div>
  </div>

  <!-- Phase 3: game -->
  <div id="game" class="phase" style="display:none">
    <div id="board"></div>
    <div id="status">Connecting…</div>
    <button id="newBtn" class="ghost">New game</button>
    <div id="log"></div>
  </div>

<script>
const FILES = "abcdefgh";
const GLYPH = { p:"♟", n:"♞", b:"♝", r:"♜", q:"♛", k:"♚", P:"♙", N:"♘", B:"♗", R:"♖", Q:"♕", K:"♔" };
let dc = null, selected = null, currentFen = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";

// How long to "search" before falling back to the bot (the cold-start window).
const WAIT_S = parseInt(new URLSearchParams(location.search).get('wait')) || 8;

function log(s){ const el=document.getElementById("log"); el.innerHTML += s+"<br>"; el.scrollTop=el.scrollHeight; }
function setStatus(s){ document.getElementById("status").textContent = s; }
function setConn(s){ document.getElementById("conn").textContent = s?("("+s+")"):""; }
function show(id){ document.getElementById(id).style.display = "flex"; }
function hide(id){ document.getElementById(id).style.display = "none"; }

// ── Phase 1: simulate matchmaking, then fall back to the bot ──────────────────
function startMatchmaking(){
  let left = WAIT_S;
  document.getElementById("mm-count").textContent = left;
  const t = setInterval(()=>{
    left--;
    document.getElementById("mm-count").textContent = Math.max(0,left);
    if(left<=0){ clearInterval(t); fallbackToBot(); }
  }, 1000);
  document.getElementById("skip").onclick = ()=>{ clearInterval(t); fallbackToBot(); };
}
function fallbackToBot(){
  hide("matchmaking");
  show("matched");
  setTimeout(()=>{ hide("matched"); show("game"); render(currentFen); connect().catch(e=>{ log("connect failed: "+e); setStatus("Connection failed: "+e.message); }); }, 1400);
}

// ── Board ─────────────────────────────────────────────────────────────────────
function render(fen){
  currentFen = fen;
  const rows = fen.split(" ")[0].split("/");
  const board = document.getElementById("board");
  board.innerHTML = "";
  for(let r=0;r<8;r++){ let c=0; for(const ch of rows[r]){ if(/\d/.test(ch)){ for(let k=0;k<+ch;k++){ addSquare(board,r,c); c++; } } else { addSquare(board,r,c,ch); c++; } } }
}
function addSquare(board,r,c,piece){
  const sq=document.createElement("div");
  sq.className="sq "+((r+c)%2===0?"light":"dark");
  const name=FILES[c]+(8-r); sq.dataset.sq=name;
  if(piece){ sq.textContent=GLYPH[piece]; sq.classList.add(piece===piece.toUpperCase()?"piece-w":"piece-b"); }
  if(selected===name) sq.classList.add("sel");
  sq.onclick=()=>onSquare(name,piece);
  board.appendChild(sq);
}
function isWhitePiece(p){ return p && p===p.toUpperCase(); }
function onSquare(name,piece){
  if(!dc || dc.readyState!=="open"){ return; }
  if(selected===null){ if(isWhitePiece(piece)){ selected=name; render(currentFen); } return; }
  if(name===selected){ selected=null; render(currentFen); return; }
  if(isWhitePiece(piece)){ selected=name; render(currentFen); return; }
  let uci = selected+name;
  const movingWhitePawn = document.querySelector(`[data-sq="${selected}"]`)?.textContent===GLYPH.P;
  if(movingWhitePawn && name[1]==="8") uci += "q";
  selected=null;
  dc.send(JSON.stringify({type:"move", uci}));
}

function onMessage(ev){
  const m=JSON.parse(ev.data);
  switch(m.type){
    case "state": render(m.fen); document.getElementById("bot-name").textContent=m.bot; setStatus("Your move (White) vs "+m.bot); break;
    case "move": render(m.fen); log("bot: "+m.san); setStatus((m.outcome&&m.outcome!=="*")?("Game over: "+m.outcome+" ("+m.method+")"):"Your move."); break;
    case "gameover": render(m.fen); setStatus("Game over: "+m.outcome+" ("+m.method+")"); break;
    case "error": log("error: "+m.message); setStatus(m.message); break;
  }
}

async function connect(){
  const pc = new RTCPeerConnection({ iceServers:[{urls:"stun:stun.l.google.com:19302"}] });
  pc.onconnectionstatechange = ()=> setConn(pc.connectionState);
  dc = pc.createDataChannel("chess");
  dc.onopen = ()=>{ log("connected to bot over WebRTC"); dc.send(JSON.stringify({type:"new"})); };
  dc.onmessage = onMessage;
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await new Promise(res=>{ if(pc.iceGatheringState==="complete") return res(); pc.onicegatheringstatechange=()=>{ if(pc.iceGatheringState==="complete") res(); }; });
  const resp = await fetch("/offer", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(pc.localDescription) });
  await pc.setRemoteDescription(await resp.json());
}

document.getElementById("newBtn").onclick=()=>{ if(dc&&dc.readyState==="open"){ selected=null; dc.send(JSON.stringify({type:"new"})); } };
startMatchmaking();
</script>
</body>
</html>
